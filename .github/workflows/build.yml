name: Build EXE

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
      
      - name: Build EXE with PyInstaller
        run: |
          pyinstaller --onefile --noconfirm --name SharjeelWebAutomation --collect-all PySide6 --collect-all playwright --collect-all openpyxl --collect-all requests app.py
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SharjeelWebAutomation
          path: dist/SharjeelWebAutomation.exe
      
      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: dist/SharjeelWebAutomation.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}